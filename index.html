<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive Ultimate v14.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Noto+Sans+JP:wght@400;700&display=swap');
        body { background-color: #fffafb; font-family: 'Inter', 'Noto Sans JP', sans-serif; color: #4a4a4a; overflow-x: hidden; }
        .card-shadow { box-shadow: 0 12px 30px -5px rgba(244, 114, 182, 0.12); }
        .tab-active { color: #f472b6; border-bottom: 3px solid #f472b6; font-weight: bold; }
        
        #detail-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 100; overflow-y: auto; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        #detail-view.open { transform: translateY(0); }

        .auto-expand-input { width: 100%; border: 1px solid transparent; padding: 10px; background: transparent; border-radius: 8px; resize: none; overflow: hidden; }
        .auto-expand-input:focus { background: #fff5f7; border-color: #fce7f3; outline: none; }
        
        .memo-outer { margin: 40px -32px 0 -32px; padding: 40px 32px; background-color: #fffafb; border-top: 1px solid #fce7f3; min-height: 500px; }
        .ribbon-label { background: linear-gradient(to right, #f472b6, #fb923c); color: white; font-size: 10px; font-weight: 700; letter-spacing: 0.12em; padding: 5px 18px; border-radius: 4px 18px 18px 4px; box-shadow: 0 4px 12px rgba(244, 114, 182, 0.3); z-index: 20; position: absolute; top: 20px; left: 0; }
        .no-img-accent { border-left: 4px solid #fbcfe8; background: linear-gradient(to right, #fff5f7, transparent); padding: 8px 14px; border-radius: 0 10px 10px 0; margin-bottom: 6px; }

        .tag-chip { font-size: 9px; padding: 3px 12px; border-radius: 99px; background: #fff1f2; color: #f43f5e; border: 1px solid #ffe4e6; cursor: pointer; }
        .tag-chip.active { background: #f43f5e; color: #fff; }

        .toggle-btn { padding: 4px 10px; border-radius: 99px; font-size: 8px; font-weight: bold; text-transform: uppercase; transition: 0.2s; }
        .toggle-on { background: #f472b6; color: white; }
        .toggle-off { background: #f3f4f6; color: #9ca3af; }

        .top-nav-btn { font-size: 9px; font-weight: 800; color: #ec4899; letter-spacing: 0.05em; display: flex; align-items: center; gap: 4px; }
        .link-card { background: #fff; border: 1px solid #fce7f3; border-radius: 12px; padding: 12px; margin-top: 8px; display: flex; justify-content: space-between; align-items: center; }

        .couple-display { display: flex; align-items: baseline; gap: 12px; margin: 4px 0 12px 0; padding-left: 12px; border-left: 2px solid #fbcfe8; }
        .couple-char { font-weight: 800; color: #4a4a4a; font-size: 15px; letter-spacing: 0.02em; }
        .couple-divider { font-size: 10px; color: #fce7f3; font-weight: 700; }
    </style>
</head>
<body class="pb-24">

    <div class="w-full h-44 bg-pink-200 flex items-center justify-center relative overflow-hidden">
        <div class="absolute inset-0 bg-cover bg-center opacity-40" style="background-image: url('https://images.unsplash.com/photo-1516550893923-42d28e5677af?auto=format&fit=crop&q=80&w=1000');"></div>
        <div class="absolute top-6 right-6 flex gap-5 z-20">
            <button onclick="createShareLink()" class="top-nav-btn"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path></svg>SHARE</button>
            <button onclick="exportStandalone()" class="top-nav-btn"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>SITE</button>
            <button onclick="exportData()" class="top-nav-btn"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"></path></svg>BACKUP</button>
        </div>
        <h1 class="relative text-2xl font-bold text-white tracking-[0.4em] uppercase drop-shadow-md">Archive</h1>
    </div>

    <div class="max-w-2xl mx-auto px-6 mt-6">
        <input type="text" id="search-bar" oninput="render()" placeholder="検索..." class="mb-4 bg-white border-none py-3 rounded-xl shadow-sm w-full px-4 text-sm outline-none">
        <div id="filter-tags" class="flex flex-wrap gap-1.5 mb-2"></div>
    </div>

    <div class="flex justify-center bg-white/90 backdrop-blur-md sticky top-0 z-30 border-b border-pink-50 mb-8">
        <button onclick="switchTab('works')" id="tab-works" class="px-6 py-4 tab-active text-[10px] tracking-widest uppercase">Works</button>
        <button onclick="switchTab('chars')" id="tab-chars" class="px-6 py-4 text-[10px] tracking-widest uppercase">Characters</button>
        <button onclick="switchTab('couplings')" id="tab-couplings" class="px-6 py-4 text-[10px] tracking-widest uppercase">Combi / CP</button>
    </div>

    <main class="max-w-2xl mx-auto px-6">
        <div id="content-area" class="grid gap-6"></div>
    </main>

    <div id="detail-view">
        <div class="sticky top-0 p-6 z-50 flex justify-between items-center bg-white/80 backdrop-blur-md">
            <button onclick="closeDetail()" class="text-pink-400 font-bold text-[10px] tracking-widest uppercase">← CLOSE</button>
            <div class="flex items-center gap-4">
                <div id="auto-save-status" class="text-[9px] text-gray-300 font-bold uppercase tracking-widest">Saved</div>
                <button id="header-delete-btn" class="text-red-500 font-extrabold text-[10px] uppercase tracking-widest bg-red-50 px-3 py-1.5 rounded-lg">DELETE</button>
            </div>
        </div>
        <div id="detail-content" class="max-w-3xl mx-auto px-8 pb-10"></div>
    </div>

    <div class="fixed bottom-6 right-6 flex flex-col gap-4 z-40">
        <button onclick="openSettings()" class="w-12 h-12 bg-white text-pink-400 rounded-full shadow-lg flex items-center justify-center text-xl border border-pink-100">⚙</button>
        <button onclick="openEntryModal()" class="w-16 h-16 btn-pink rounded-full shadow-2xl flex items-center justify-center text-3xl font-light">+</button>
    </div>

    <div id="toast" class="fixed top-10 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full text-[10px] font-bold tracking-[0.2em] opacity-0 transition-opacity z-[110] uppercase">Success</div>

    <script>
        const defaultSchemas = {
            works: [{ id: 'name', label: '作品名', type: 'text', visible: true, isTitle: true }, { id: 'media', label: 'メディア', type: 'text', visible: true }, { id: 'period', label: 'ハマった時期', type: 'date', visible: true }, { id: 'url', label: '公式サイト', type: 'url', visible: false }, { id: 'img', label: '画像', type: 'file', visible: true }, { id: 'memo', label: 'Note', type: 'textarea', visible: true, isAccordion: true }, { id: 'tags', label: 'タグ', type: 'tags', visible: true }],
            chars: [{ id: 'name', label: 'キャラクター名', type: 'text', visible: true, isTitle: true }, { id: 'work', label: '作品名', type: 'text', visible: true }, { id: 'period', label: 'ハマった時期', type: 'date', visible: true }, { id: 'url', label: 'リンク', type: 'url', visible: false }, { id: 'img', label: '画像', type: 'file', visible: true }, { id: 'memo', label: 'Note', type: 'textarea', visible: true, isAccordion: true }, { id: 'tags', label: 'タグ', type: 'tags', visible: true }],
            couplings: [{ id: 'name', label: 'コンビ・カプ名', type: 'text', visible: true, isTitle: true }, { id: 'char1', label: 'キャラクター1', type: 'text', visible: true }, { id: 'char2', label: 'キャラクター2', type: 'text', visible: true }, { id: 'work', label: '作品名', type: 'text', visible: true }, { id: 'period', label: 'ハマった時期', type: 'date', visible: true }, { id: 'url', label: '参考URL', type: 'url', visible: false }, { id: 'img', label: '画像', type: 'file', visible: true }, { id: 'memo', label: 'Note', type: 'textarea', visible: true, isAccordion: true }, { id: 'tags', label: 'タグ', type: 'tags', visible: true }]
        };

        const updatedSamples = {
            works: [{ name: "サンプル", media: "絵本", period: "2026-03-07", url: "https://example.com", memo: "画像を自動圧縮する機能が搭載されています。", tags: "サンプル", visConfig: {} }],
            chars: [
                { name: "太郎", work: "サンプル", period: "2026-03-07", memo: "元気な男の子。", tags: "主人公", ribbonId: "name", visConfig: {} },
                { name: "花子", work: "サンプル", period: "2026-03-07", memo: "しっかり者の女の子。", tags: "ヒロイン", ribbonId: "name", visConfig: {} }
            ],
            couplings: [{ name: "花太", char1: "花子", char2: "太郎", work: "サンプル", period: "2026-03-07", memo: "仲良しな二人組。", tags: "友情", visConfig: { name: false } }]
        };

        let state = { currentTab: 'works', schemas: JSON.parse(localStorage.getItem('archive_schemas')) || defaultSchemas, data: JSON.parse(localStorage.getItem('archive_data')) || updatedSamples, activeTag: null };

        const compressImage = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader(); reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image(); img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width; let h = img.height; const max = 1000;
                        if (w > h) { if (w > max) { h *= max / w; w = max; } } else { if (h > max) { w *= max / h; h = max; } }
                        canvas.width = w; canvas.height = h;
                        const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                };
            });
        };

        function render() {
            const container = document.getElementById('content-area');
            const search = (document.getElementById('search-bar')?.value || '').toLowerCase();
            const schema = state.schemas[state.currentTab];
            const items = state.data[state.currentTab];
            container.innerHTML = items.length ? '' : '<p class="text-center text-gray-300 py-32 uppercase tracking-widest text-[10px]">No Data</p>';

            items.forEach((item, idx) => {
                if (search && !JSON.stringify(item).toLowerCase().includes(search)) return;
                const tagField = schema.find(f => f.type === 'tags');
                if (state.activeTag && !(item[tagField?.id] || '').split(',').map(t => t.trim()).includes(state.activeTag)) return;

                let fieldsHtml = ''; let titleHtml = ''; let headerHtml = ''; let ribbonHtml = ''; let coupleHtml = '';
                const imgId = schema.find(f => f.type === 'file')?.id;
                const imgVal = item[imgId];
                const getVis = (fid) => item.visConfig?.[fid] ?? schema.find(s=>s.id===fid).visible;

                if (imgVal && item.ribbonId !== 'none') {
                    const rId = item.ribbonId || schema.find(f => f.isTitle).id;
                    const rField = schema.find(f => f.id === rId);
                    if (rField && item[rField.id]) ribbonHtml = `<div class="ribbon-label uppercase">${item[rField.id]}</div>`;
                }

                if (state.currentTab === 'couplings') {
                    const v1 = getVis('char1'); const v2 = getVis('char2');
                    if ((v1 || v2) && (item.char1 || item.char2)) {
                        coupleHtml = `<div class="col-span-2 couple-display"><span class="couple-char">${item.char1 || ''}</span><span class="couple-divider">&</span><span class="couple-char">${item.char2 || ''}</span></div>`;
                    }
                }

                schema.forEach(field => {
                    if (state.currentTab === 'couplings' && (field.id === 'char1' || field.id === 'char2')) return;
                    if (!getVis(field.id) || !item[field.id] || field.isAccordion || field.type === 'url') return;
                    if (field.isTitle) titleHtml = `<h2 class="text-lg font-bold text-gray-800 leading-tight">${item[field.id]}</h2>`;
                    else if (field.type === 'file') headerHtml = `<img src="${imgVal}" class="w-full h-72 object-cover transition-opacity hover:opacity-95">`;
                    else if (field.type === 'tags') {
                        const tags = item[field.id].split(',').map(t => `<span class="tag-chip">${t.trim()}</span>`).join('');
                        fieldsHtml += `<div class="col-span-2 flex flex-wrap gap-1 mt-1">${tags}</div>`;
                    } else {
                        const isMain = field.id === 'work' || field.label.includes('作品');
                        const displayVal = field.type === 'date' ? item[field.id].slice(0,7).replace('-','/') : item[field.id];
                        fieldsHtml += `<div class="${isMain ? 'no-img-accent col-span-2' : 'mb-0.5'}">${isMain ? '' : `<label class="text-[7px] text-gray-300 uppercase font-bold tracking-widest block">${field.label}</label>`}<span class="${isMain ? 'text-sm text-gray-700 font-bold' : 'text-[10px] text-gray-600 font-medium'}">${displayVal}</span></div>`;
                    }
                });

                container.innerHTML += `<div class="bg-white rounded-[2rem] overflow-hidden card-shadow border border-pink-50 relative active:scale-[0.98] transition-all" onclick="openDetail(${idx})">${ribbonHtml} ${imgVal ? headerHtml : ''}<div class="p-5">${titleHtml ? `<div class="mb-3">${titleHtml}</div>` : ''}<div class="grid grid-cols-2 gap-x-4 gap-y-1 items-end">${coupleHtml}${fieldsHtml}</div></div></div>`;
            });
            renderTagFilters(items, schema);
        }

        function openDetail(index) {
            const item = state.data[state.currentTab][index];
            const schema = state.schemas[state.currentTab];
            const content = document.getElementById('detail-content');
            let html = '';
            const imgField = schema.find(f => f.type === 'file');

            // 削除ボタンに関数を紐付け
            document.getElementById('header-delete-btn').onclick = () => { if(confirm('本当に削除しますか？')) { state.data[state.currentTab].splice(index, 1); saveState(); closeDetail(); render(); } };

            html += `<div class="relative mb-12">${item[imgField.id] ? `<img src="${item[imgField.id]}" class="w-full h-[50vh] object-cover rounded-[3rem] shadow-2xl">` : '<div class="no-img-header rounded-[3rem] shadow-inner flex items-center justify-center text-[10px] text-gray-300 font-bold uppercase tracking-widest h-64 bg-gray-50">Add Photo</div>'}<input type="file" onchange="updateDetailImage(${index}, this)" class="absolute inset-0 opacity-0 cursor-pointer"></div>`;
            html += `<div class="mb-10 p-4 bg-gray-50 rounded-2xl border border-gray-100"><label class="text-[9px] font-bold text-gray-400 uppercase tracking-widest block mb-2">Image URL</label><input type="text" value="${item[imgField.id]?.startsWith('http') ? item[imgField.id] : ''}" onchange="updateDetailField(${index}, '${imgField.id}', this.value); openDetail(${index})" class="w-full bg-white text-xs p-2 rounded-lg border-none outline-none" placeholder="https://..."></div>`;

            if (item[imgField.id]) {
                html += `<div class="flex items-center gap-4 mb-10 bg-pink-50/50 p-4 rounded-2xl border border-pink-100/50"><label class="text-[9px] font-bold text-pink-400 uppercase tracking-widest">Ribbon Selection</label><select onchange="updateDetailField(${index}, 'ribbonId', this.value)" class="bg-white text-[11px] py-1 px-3 rounded-lg border-none flex-1"><option value="none">None</option>${schema.map(f => f.type !== 'file' ? `<option value="${f.id}" ${item.ribbonId === f.id || (!item.ribbonId && f.isTitle) ? 'selected' : ''}>${f.label}</option>` : '').join('')}</select></div>`;
            }

            // Note以外のフィールドを描画
            let noteHtml = '';
            schema.forEach((field, i) => {
                if (field.type === 'file') return;
                const val = item[field.id] || '';
                const isVisible = item.visConfig?.[field.id] ?? field.visible;

                if (field.isAccordion) {
                    noteHtml = `<div class="memo-outer"><label class="text-[10px] text-pink-300 font-extrabold uppercase tracking-[0.5em] block mb-10 text-center">— Note —</label><textarea oninput="updateDetailField(${index}, '${field.id}', this.value); autoGrow(this)" class="auto-expand-input leading-loose text-gray-600 text-base min-h-[500px]" placeholder="思いのままに...">${val}</textarea></div>`;
                    return;
                }

                if (field.isTitle) {
                    html += `<div class="flex items-center gap-3 mb-8"><button onclick="toggleCardVis(${i}, ${index})" class="toggle-btn ${isVisible ? 'toggle-on' : 'toggle-off'}">${isVisible ? 'ON' : 'OFF'}</button><textarea oninput="updateDetailField(${index}, '${field.id}', this.value); autoGrow(this)" class="text-3xl font-bold tracking-tight w-full outline-none resize-none overflow-hidden h-auto bg-transparent" placeholder="Untitled">${val}</textarea></div>`;
                } else if (field.type === 'url') {
                    html += `<div class="flex items-start py-4 border-b border-gray-50 group gap-2"><button onclick="toggleCardVis(${i}, ${index})" class="toggle-btn flex-shrink-0 mt-2 ${isVisible ? 'toggle-on' : 'toggle-off'}">${isVisible ? 'ON' : 'OFF'}</button><label class="w-24 text-[9px] text-gray-300 font-bold uppercase tracking-widest pt-2.5 flex-shrink-0">${field.label}</label><div class="flex-1"><input type="text" value="${val}" oninput="updateDetailField(${index}, '${field.id}', this.value)" class="inline-input text-xs text-blue-400 underline mb-2 w-full outline-none" placeholder="https://...">${val ? `<div class="link-card"><a href="${val}" target="_blank" class="text-[11px] font-bold text-gray-600 truncate mr-4">Open Link ↗</a><button onclick="copyToClipboard('${val}')" class="text-[8px] text-gray-300 font-bold uppercase tracking-widest">Copy</button></div>`:''}</div></div>`;
                } else if (field.type === 'date') {
                    html += `<div class="flex items-start py-4 border-b border-gray-50 group gap-2"><button onclick="toggleCardVis(${i}, ${index})" class="toggle-btn flex-shrink-0 mt-2 ${isVisible ? 'toggle-on' : 'toggle-off'}">${isVisible ? 'ON' : 'OFF'}</button><label class="w-24 text-[9px] text-gray-300 font-bold uppercase tracking-widest pt-2.5 flex-shrink-0">${field.label}</label><input type="date" value="${val}" oninput="updateDetailField(${index}, '${field.id}', this.value)" class="auto-expand-input text-sm text-gray-600 font-medium outline-none"></div>`;
                } else {
                    html += `<div class="flex items-start py-4 border-b border-gray-50 group gap-2"><div class="flex flex-col gap-1 opacity-0 group-hover:opacity-100"><button onclick="moveDetailField(${index}, ${i}, -1)" class="text-[9px] text-gray-200">▲</button><button onclick="moveDetailField(${index}, ${i}, 1)" class="text-[9px] text-gray-200">▼</button></div><button onclick="toggleCardVis(${i}, ${index})" class="toggle-btn flex-shrink-0 mt-2 ${isVisible ? 'toggle-on' : 'toggle-off'}">${isVisible ? 'ON' : 'OFF'}</button><label class="w-24 text-[9px] text-gray-300 font-bold uppercase tracking-widest pt-2.5 flex-shrink-0">${field.label}</label><textarea oninput="updateDetailField(${index}, '${field.id}', this.value); autoGrow(this)" class="auto-expand-input text-sm text-gray-600 font-medium" rows="1" placeholder="Empty">${val}</textarea><button onclick="removeDetailField(${index}, ${i})" class="text-gray-200 hover:text-red-400 text-lg px-2 opacity-0 group-hover:opacity-100">×</button></div>`;
                }
            });

            // Noteを一番最後に配置
            html += `<div class="py-6 flex justify-center"><button onclick="addDetailField(${index})" class="text-[10px] text-pink-300 font-bold uppercase tracking-widest">+ Add Field</button></div>`;
            html += noteHtml;

            content.innerHTML = html;
            document.querySelectorAll('textarea').forEach(t => autoGrow(t));
            document.getElementById('detail-view').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        // ロジック
        function toggleCardVis(fIdx, eIdx) { const entry = state.data[state.currentTab][eIdx]; const fId = state.schemas[state.currentTab][fIdx].id; if(!entry.visConfig) entry.visConfig = {}; const current = entry.visConfig[fId] ?? state.schemas[state.currentTab][fIdx].visible; entry.visConfig[fId] = !current; saveState(); openDetail(eIdx); render(); }
        async function createShareLink() { showToast('Creating...'); try { const res = await fetch('https://api.jsonstorage.net/v1/json', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ data: state.data, schemas: state.schemas }) }); const r = await res.json(); const url = `${window.location.origin}${window.location.pathname}?id=${r.uri.split('/').pop()}`; await navigator.clipboard.writeText(url); alert("Shared URL copied!"); } catch (e) { alert("Error"); } }
        function copyToClipboard(text) { navigator.clipboard.writeText(text); showToast('Copied'); }
        function renderTagFilters(items, schema) { const tagSet = new Set(); const tf = schema.find(f => f.type === 'tags'); items.forEach(item => { if (tf && item[tf.id]) item[tf.id].split(',').forEach(t => tagSet.add(t.trim())); }); const fc = document.getElementById('filter-tags'); fc.innerHTML = `<span onclick="toggleTagFilter(null)" class="tag-chip ${!state.activeTag ? 'active' : ''} bg-gray-100 text-gray-400 border-none">すべて</span>`; tagSet.forEach(tag => { if (tag) fc.innerHTML += `<span onclick="toggleTagFilter('${tag}')" class="tag-chip ${state.activeTag === tag ? 'active' : ''}">${tag}</span>`; }); }
        function toggleTagFilter(tag) { state.activeTag = tag; render(); }
        function autoGrow(el) { el.style.height = "5px"; el.style.height = (el.scrollHeight) + "px"; }
        function saveState() { localStorage.setItem('archive_data', JSON.stringify(state.data)); localStorage.setItem('archive_schemas', JSON.stringify(state.schemas)); }
        function showAutoSave() { document.getElementById('auto-save-status').innerText = 'Saving...'; setTimeout(() => document.getElementById('auto-save-status').innerText = 'Saved', 800); }
        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.opacity = '1'; setTimeout(() => t.style.opacity = '0', 2000); }
        function closeDetail() { document.getElementById('detail-view').classList.remove('open'); document.body.style.overflow = ''; render(); }
        function updateDetailField(idx, id, val) { state.data[state.currentTab][idx][id] = val; saveState(); showAutoSave(); }
        async function updateDetailImage(idx, input) { if (input.files[0]) { showToast('Compressing...'); const b64 = await compressImage(input.files[0]); updateDetailField(idx, state.schemas[state.currentTab].find(f => f.type === 'file').id, b64); openDetail(idx); } }
        function switchTab(t) { state.currentTab = t; document.querySelectorAll('button[id^="tab-"]').forEach(b => b.classList.remove('tab-active')); document.getElementById(`tab-${t}`).classList.add('tab-active'); render(); }
        function openSettings() { document.getElementById('settings-modal').classList.remove('hidden'); renderSettingsFields(); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function moveDetailField(eIdx, fIdx, dir) { const s = state.schemas[state.currentTab]; if(fIdx+dir<0 || fIdx+dir>=s.length) return; [s[fIdx], s[fIdx+dir]] = [s[fIdx+dir], s[fIdx]]; openDetail(eIdx); }
        function addDetailField(eIdx) { state.schemas[state.currentTab].push({ id: 'c'+Date.now(), label: '新規項目', type: 'text', visible: true }); openDetail(eIdx); }
        function removeDetailField(eIdx, fIdx) { if(confirm('Delete?')) { state.schemas[state.currentTab].splice(fIdx, 1); openDetail(eIdx); } }
        function exportData() { const blob = new Blob([JSON.stringify(state.data)]); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'backup.json'; a.click(); }
        function exportStandalone() { let h = document.documentElement.outerHTML; const d = `<script>window.PRELOADED_DATA = ${JSON.stringify(state.data)}; window.PRELOADED_SCHEMAS = ${JSON.stringify(state.schemas)};<\/script>`; h = h.replace('</head>', d + '</head>'); const b = new Blob([h], {type: 'text/html'}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'Archive_Site.html'; a.click(); }
        function renderSettingsFields() { const c = document.getElementById('settings-fields'); c.innerHTML = ''; state.schemas[state.currentTab].forEach((f, i) => { c.innerHTML += `<div class="settings-card shadow-sm"><div class="flex items-center gap-3"><input type="text" value="${f.label}" onchange="state.schemas[state.currentTab][${i}].label = this.value" class="text-xs font-bold p-3 flex-1 rounded-2xl bg-gray-50 border-none shadow-inner"><button onclick="state.schemas[state.currentTab][${i}].visible = !state.schemas[state.currentTab][${i}].visible; renderSettingsFields()" class="toggle-btn ${f.visible ? 'toggle-on' : 'toggle-off'}">${f.visible ? 'ON' : 'OFF'}</button>${f.isTitle ? '' : `<button onclick="state.schemas[state.currentTab].splice(${i}, 1); renderSettingsFields()" class="text-gray-300 text-xl px-2">×</button>`}</div></div>`; }); }

        window.addEventListener('load', async () => {
            const params = new URLSearchParams(window.location.search);
            if (params.get('id')) { try { const res = await fetch(`https://api.jsonstorage.net/v1/json/${params.get('id')}`); const s = await res.json(); state.data = s.data; state.schemas = s.schemas; } catch (e) {} }
            if (window.PRELOADED_DATA) { state.data = window.PRELOADED_DATA; state.schemas = window.PRELOADED_SCHEMAS; }
            render();
        });

        function openEntryModal() {
            const m = document.createElement('div'); m.className = "fixed inset-0 bg-black/40 flex items-center justify-center z-[70] p-4 backdrop-blur-md"; m.id = "new-entry-modal";
            let f = state.schemas[state.currentTab].map(s => {
                if(s.type === 'file') return `<div><label class="text-[9px] text-gray-400 font-bold uppercase">${s.label}</label><input type="file" id="new-${s.id}" class="text-xs block mb-2"><input type="text" id="new-url-${s.id}" placeholder="または画像URLを貼り付け" class="w-full border-pink-100 border p-3 rounded-xl text-[11px] mb-4 outline-none"></div>`;
                if(s.type === 'date') return `<div><label class="text-[9px] text-gray-400 font-bold uppercase">${s.label}</label><input type="date" id="new-${s.id}" class="w-full border-pink-100 border p-3 rounded-xl text-sm outline-none mb-4"></div>`;
                return `<input type="text" id="new-${s.id}" placeholder="${s.label}" class="w-full border-pink-100 border p-3 rounded-xl text-sm mb-4 outline-none">`;
            }).join('');
            m.innerHTML = `<div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl max-h-[90vh] overflow-y-auto"><h2 class="text-xl font-bold mb-6 text-pink-500 uppercase tracking-widest text-center">New Entry</h2><div class="space-y-1">${f}</div><button onclick="saveEntryAction()" class="w-full btn-pink py-4 rounded-2xl font-bold mt-8 uppercase tracking-widest text-sm shadow-xl shadow-pink-100">Save</button><button onclick="this.closest('#new-entry-modal').remove()" class="w-full text-gray-300 text-[10px] font-bold mt-4 uppercase tracking-widest text-center">Cancel</button></div>`;
            document.body.appendChild(m);
        }
        async function saveEntryAction() {
            const item = { visConfig: {} };
            for(const f of state.schemas[state.currentTab]) {
                const el = document.getElementById(`new-${f.id}`); if(!el) continue;
                if(f.type === 'file') {
                    const urlEl = document.getElementById(`new-url-${f.id}`);
                    if(urlEl && urlEl.value) item[f.id] = urlEl.value;
                    else if(el.files[0]) item[f.id] = await compressImage(el.files[0]);
                    else item[f.id] = '';
                } else item[f.id] = el.value || '';
            }
            state.data[state.currentTab].push(item);
            saveState(); render(); document.getElementById('new-entry-modal').remove();
        }
    </script>

    <div id="settings-modal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-[70] p-4 backdrop-blur-md text-sm">
        <div class="bg-white w-full max-w-lg rounded-[2.5rem] p-8 max-h-[90vh] overflow-y-auto">
            <h2 class="text-xl font-bold mb-6 text-pink-500 uppercase tracking-widest text-center">Settings</h2>
            <div id="settings-fields" class="space-y-1"></div>
            <button onclick="state.schemas[state.currentTab].push({ id: 'c'+Date.now(), label: 'New Field', type: 'text', visible: true }); renderSettingsFields();" class="text-[11px] font-bold text-pink-300 mt-8 block uppercase tracking-widest mx-auto">+ Add New Field</button>
            <div class="flex gap-4 mt-10 pt-6 border-t border-pink-50">
                <button onclick="saveState(); closeModal('settings-modal'); render();" class="flex-1 btn-pink py-4 rounded-2xl font-bold uppercase tracking-widest">Apply</button>
                <button onclick="closeModal('settings-modal')" class="px-6 py-4 text-gray-400 text-xs uppercase tracking-widest">Close</button>
            </div>
        </div>
    </div>
</body>
</html>
